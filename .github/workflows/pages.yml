name: Refresh data and deploy dashboard

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "arrival-pulse-pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        if: github.event_name != 'push'
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Refresh OpenSky arrival data
        if: github.event_name != 'push'
        env:
          OPENSKY_CLIENT_ID: ${{ secrets.OPENSKY_CLIENT_ID }}
          OPENSKY_CLIENT_SECRET: ${{ secrets.OPENSKY_CLIENT_SECRET }}
        run: python scripts/update_data.py

      - name: Commit refreshed data
        if: github.event_name != 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/arrivals.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "data: refresh arrival observations"
            git push
          fi

      - name: Assemble static site
        run: |
          mkdir _site
          cp index.html styles.css app.js favicon.svg .nojekyll _site/
          cp -R data _site/data

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "_site"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
